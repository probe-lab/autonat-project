# AutoNAT v2 Lab - Docker Compose
#
# Profiles:
#   local      - AutoNAT experiment with local servers, client behind NAT
#   nonat      - AutoNAT experiment with local servers, client on public network (no NAT)
#   5servers   - Add servers 4-5 (use with local or nonat)
#   7servers   - Add servers 6-7 (use with local/nonat + 5servers)
#   unreliable - Add 3 unreliable servers (dial-back blocked, for v1/v2 gap reproduction)
#   mock       - Mock AutoNAT v2 servers with controllable behaviors
#   rust       - Rust client behind NAT (rust-libp2p)
#   rust-nonat - Rust client on public network
#   rust-mock  - Rust client with mock servers
#   js         - JS client behind NAT (js-libp2p)
#   js-nonat   - JS client on public network
#   js-mock    - JS client with mock servers
#   test       - Lightweight NAT verification (socat, no Go binary)
#
# Jaeger (OTLP trace collector) starts automatically with every experiment.
# Jaeger UI available at http://localhost:16686
#
# Environment variables:
#   NAT_TYPE       - none, full-cone, address-restricted, port-restricted, symmetric
#   TRANSPORT        - tcp, quic, or both (default: both)
#   PACKET_LOSS      - Packet loss percentage for tc netem (default: 0)
#   LATENCY_MS       - Added latency in ms for tc netem (default: 10)
#   TCP_BLOCK_PORT   - Block outbound TCP to this port (e.g., 4001)
#   PORT_REMAP       - Remap source port (e.g., 4001:29538)
#   MOCK_BEHAVIOR_N  - Behavior for mock-server-N (default: force-unreachable)
#   MOCK_DELAY_N     - Response delay ms for mock-server-N (default: 0)

# Network layout:
#   public-net  (73.0.0.0/24)  — servers and router's public side.
#     Uses a "public-looking" range because go-libp2p's manet.IsPublicAddr()
#     filters out all private/reserved/CGNAT ranges. The router's public IP
#     is what servers report as the client's observed address via Identify,
#     and AutoNAT v2 only probes addresses that pass IsPublicAddr().
#   private-net (10.0.1.0/24)  — client and router's private side.
#     Uses a standard private range, matching real-world deployments.
#     The client's 10.x address is correctly filtered by IsPublicAddr() —
#     it never appears in DialRequests, just like in production.
networks:
  public-net:
    driver: bridge
    ipam:
      config:
        - subnet: 73.0.0.0/24
  private-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24

volumes:
  peer-addrs:  # shared volume for server address discovery

# Shared build config for autonat node containers (servers + clients).
# Build context is testbed/ where Go source lives.
x-node-build: &node-build
  build:
    context: ..
    dockerfile: docker/node/Dockerfile

x-node-rust-build: &node-rust-build
  build:
    context: ../..
    dockerfile: testbed/docker/node-rust/Dockerfile

x-node-js-build: &node-js-build
  build:
    context: ../..
    dockerfile: testbed/docker/node-js/Dockerfile

# Shared healthcheck timing for server containers.
# test command is overridden per server to check its specific addr file.
x-server-healthcheck: &server-healthcheck
  interval: 2s
  timeout: 5s
  retries: 15
  start_period: 5s

services:
  # Jaeger is the single trace collection backend.
  # All client nodes export spans via OTLP HTTP to jaeger:4318.
  # Jaeger UI: http://localhost:16686
  # Jaeger API: http://localhost:16686/api/traces (used by run.py for trace queries)
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver
    networks:
      public-net:
        ipv4_address: 73.0.0.50
      private-net:
        ipv4_address: 10.0.1.50

  # NAT Router: sits between public-net and private-net
  router:
    build: ./router
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    environment:
      - NAT_TYPE=${NAT_TYPE:-none}
      - PACKET_LOSS=${PACKET_LOSS:-0}
      - LATENCY_MS=${LATENCY_MS:-10}
      - TCP_BLOCK_PORT=${TCP_BLOCK_PORT:-}
      - PORT_REMAP=${PORT_REMAP:-}
      - PORT_FORWARD=${PORT_FORWARD:-}
      - PORT_FORWARD_PORT=${PORT_FORWARD_PORT:-4001}
      - UPNP=${UPNP:-}
      - CLIENT_PRIVATE_IP=10.0.1.10
    networks:
      public-net:
        ipv4_address: 73.0.0.2
      private-net:
        ipv4_address: 10.0.1.2

  # === AutoNAT servers on the public network ===
  # Servers write their multiaddrs to a shared volume so the client can discover them.

  server-1:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["local", "nonat", "rust", "rust-nonat", "js", "js-nonat"]
    environment:
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
    command: ["--role=server", "--transport=${TRANSPORT:-both}", "--port=4001", "--addr-file=/peer-addrs/server-1"]
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/server-1"]

  server-2:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["local", "nonat", "rust", "rust-nonat", "js", "js-nonat"]
    environment:
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
    command: ["--role=server", "--transport=${TRANSPORT:-both}", "--port=4001", "--addr-file=/peer-addrs/server-2"]
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/server-2"]

  server-3:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["local", "nonat", "rust", "rust-nonat", "js", "js-nonat"]
    environment:
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
    command: ["--role=server", "--transport=${TRANSPORT:-both}", "--port=4001", "--addr-file=/peer-addrs/server-3"]
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/server-3"]

  server-4:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["5servers", "7servers"]
    environment:
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
    command: ["--role=server", "--transport=${TRANSPORT:-both}", "--port=4001", "--addr-file=/peer-addrs/server-4"]
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/server-4"]

  server-5:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["5servers", "7servers"]
    environment:
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
    command: ["--role=server", "--transport=${TRANSPORT:-both}", "--port=4001", "--addr-file=/peer-addrs/server-5"]
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/server-5"]

  server-6:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["7servers"]
    environment:
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
    command: ["--role=server", "--transport=${TRANSPORT:-both}", "--port=4001", "--addr-file=/peer-addrs/server-6"]
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/server-6"]

  server-7:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["7servers"]
    environment:
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
    command: ["--role=server", "--transport=${TRANSPORT:-both}", "--port=4001", "--addr-file=/peer-addrs/server-7"]
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/server-7"]

  # === Client node behind NAT ===
  # Reads server multiaddrs from the shared volume.
  client:
    <<: *node-build
    cap_add:
      - NET_ADMIN  # needed to set default gateway to router
    depends_on:
      router:
        condition: service_started
      jaeger:
        condition: service_started
      server-1:
        condition: service_healthy
      server-2:
        condition: service_healthy
      server-3:
        condition: service_healthy
    profiles: ["local"]
    environment:
      - GATEWAY=auto
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
    command: >-
      --role=client
      --transport=${TRANSPORT:-both}
      --port=4001
      --peer-dir=/peer-addrs
      --otlp-endpoint=http://jaeger:4318
      --obs-addr-thresh=${OBS_ADDR_THRESH:-0}
      --autonat-refresh=${AUTONAT_REFRESH:-0}
    volumes:
      - peer-addrs:/peer-addrs:ro
    networks:
      private-net:
        ipv4_address: 10.0.1.10

  # === Client with public IP (no NAT) ===
  # Sits directly on public-net with a public-looking IP. No router involved.
  # Servers see the client's actual 73.x IP — no translation needed.
  # Used for the no-NAT baseline experiment.
  client-nonat:
    <<: *node-build
    depends_on:
      jaeger:
        condition: service_started
      server-1:
        condition: service_healthy
      server-2:
        condition: service_healthy
      server-3:
        condition: service_healthy
    profiles: ["nonat"]
    environment:
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
    command: >-
      --role=client
      --transport=${TRANSPORT:-both}
      --port=4001
      --peer-dir=/peer-addrs
      --otlp-endpoint=http://jaeger:4318
      --obs-addr-thresh=${OBS_ADDR_THRESH:-0}
    volumes:
      - peer-addrs:/peer-addrs:ro
    networks:
      public-net:
        ipv4_address: 73.0.0.100

  # === Unreliable servers (for v1/v2 gap reproduction) ===
  # Real libp2p servers that serve both v1 and v2 protocols, but with iptables
  # rules blocking NEW outbound connections to the client's public IP.
  # This simulates DHT peers behind restrictive NAT that can accept connections
  # but whose dial-back attempts fail — causing v1 to oscillate while v2 stays
  # stable (v2 reaches targetConfidence from the reliable servers).

  unreliable-server-1:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["unreliable"]
    environment:
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
      - BLOCK_DIALBACK_TO=${ROUTER_PUBLIC_IP:-73.0.0.2}
    command: ["--role=server", "--transport=${TRANSPORT:-both}", "--port=4001", "--addr-file=/peer-addrs/unreliable-server-1"]
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/unreliable-server-1"]

  unreliable-server-2:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["unreliable"]
    environment:
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
      - BLOCK_DIALBACK_TO=${ROUTER_PUBLIC_IP:-73.0.0.2}
    command: ["--role=server", "--transport=${TRANSPORT:-both}", "--port=4001", "--addr-file=/peer-addrs/unreliable-server-2"]
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/unreliable-server-2"]

  unreliable-server-3:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["unreliable"]
    environment:
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
      - BLOCK_DIALBACK_TO=${ROUTER_PUBLIC_IP:-73.0.0.2}
    command: ["--role=server", "--transport=${TRANSPORT:-both}", "--port=4001", "--addr-file=/peer-addrs/unreliable-server-3"]
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/unreliable-server-3"]

  unreliable-server-4:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["unreliable"]
    environment:
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
      - BLOCK_DIALBACK_TO=${ROUTER_PUBLIC_IP:-73.0.0.2}
    command: ["--role=server", "--transport=${TRANSPORT:-both}", "--port=4001", "--addr-file=/peer-addrs/unreliable-server-4"]
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/unreliable-server-4"]

  unreliable-server-5:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["unreliable"]
    environment:
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
      - BLOCK_DIALBACK_TO=${ROUTER_PUBLIC_IP:-73.0.0.2}
    command: ["--role=server", "--transport=${TRANSPORT:-both}", "--port=4001", "--addr-file=/peer-addrs/unreliable-server-5"]
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/unreliable-server-5"]

  # === Mock AutoNAT v2 servers ===
  # Controllable servers that generate specific protocol responses.
  # Use MOCK_BEHAVIOR_N env vars to set behavior per server.
  # See mock_server.go for available behaviors.

  mock-server-1:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["mock"]
    command: >-
      --role=mock-server
      --behavior=${MOCK_BEHAVIOR_1:-force-unreachable}
      --delay=${MOCK_DELAY_1:-0}
      --jitter=${MOCK_JITTER_1:-0}
      --probability=${MOCK_PROBABILITY_1:-0.5}
      --tcp-behavior=${MOCK_TCP_BEHAVIOR_1:-}
      --quic-behavior=${MOCK_QUIC_BEHAVIOR_1:-}
      --transport=${TRANSPORT:-both}
      --port=4001
      --addr-file=/peer-addrs/mock-server-1
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/mock-server-1"]

  mock-server-2:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["mock"]
    command: >-
      --role=mock-server
      --behavior=${MOCK_BEHAVIOR_2:-force-unreachable}
      --delay=${MOCK_DELAY_2:-0}
      --jitter=${MOCK_JITTER_2:-0}
      --probability=${MOCK_PROBABILITY_2:-0.5}
      --tcp-behavior=${MOCK_TCP_BEHAVIOR_2:-}
      --quic-behavior=${MOCK_QUIC_BEHAVIOR_2:-}
      --transport=${TRANSPORT:-both}
      --port=4001
      --addr-file=/peer-addrs/mock-server-2
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/mock-server-2"]

  mock-server-3:
    <<: *node-build
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["mock"]
    command: >-
      --role=mock-server
      --behavior=${MOCK_BEHAVIOR_3:-force-unreachable}
      --delay=${MOCK_DELAY_3:-0}
      --jitter=${MOCK_JITTER_3:-0}
      --probability=${MOCK_PROBABILITY_3:-0.5}
      --tcp-behavior=${MOCK_TCP_BEHAVIOR_3:-}
      --quic-behavior=${MOCK_QUIC_BEHAVIOR_3:-}
      --transport=${TRANSPORT:-both}
      --port=4001
      --addr-file=/peer-addrs/mock-server-3
    volumes:
      - peer-addrs:/peer-addrs
    networks:
      - public-net
    healthcheck:
      <<: *server-healthcheck
      test: ["CMD", "test", "-f", "/peer-addrs/mock-server-3"]

  # Client for mock server experiments — on public network (no NAT)
  # so mock servers can dial back directly for Category B behaviors.
  client-mock:
    <<: *node-build
    depends_on:
      jaeger:
        condition: service_started
      mock-server-1:
        condition: service_healthy
      mock-server-2:
        condition: service_healthy
      mock-server-3:
        condition: service_healthy
    profiles: ["mock"]
    environment:
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-}
    command: >-
      --role=client
      --transport=${TRANSPORT:-both}
      --port=4001
      --peer-dir=/peer-addrs
      --otlp-endpoint=http://jaeger:4318
      --obs-addr-thresh=${OBS_ADDR_THRESH:-0}
    volumes:
      - peer-addrs:/peer-addrs:ro
    networks:
      public-net:
        ipv4_address: 73.0.0.100

  # === Rust client behind NAT ===
  client-rust:
    <<: *node-rust-build
    cap_add:
      - NET_ADMIN
    depends_on:
      router:
        condition: service_started
      jaeger:
        condition: service_started
      server-1:
        condition: service_healthy
      server-2:
        condition: service_healthy
      server-3:
        condition: service_healthy
    profiles: ["rust"]
    environment:
      - GATEWAY=auto
    command: >-
      --role=client
      --transport=${TRANSPORT:-both}
      --port=4001
      --peer-dir=/peer-addrs
      --otlp-endpoint=http://jaeger:4318
    volumes:
      - peer-addrs:/peer-addrs:ro
    networks:
      private-net:
        ipv4_address: 10.0.1.10

  # === Rust client with public IP (no NAT) ===
  client-rust-nonat:
    <<: *node-rust-build
    depends_on:
      jaeger:
        condition: service_started
      server-1:
        condition: service_healthy
      server-2:
        condition: service_healthy
      server-3:
        condition: service_healthy
    profiles: ["rust-nonat"]
    command: >-
      --role=client
      --transport=${TRANSPORT:-both}
      --port=4001
      --peer-dir=/peer-addrs
      --otlp-endpoint=http://jaeger:4318
    volumes:
      - peer-addrs:/peer-addrs:ro
    networks:
      public-net:
        ipv4_address: 73.0.0.101

  # === Rust client for mock server experiments ===
  client-rust-mock:
    <<: *node-rust-build
    depends_on:
      jaeger:
        condition: service_started
      mock-server-1:
        condition: service_healthy
      mock-server-2:
        condition: service_healthy
      mock-server-3:
        condition: service_healthy
    profiles: ["rust-mock"]
    command: >-
      --role=client
      --transport=${TRANSPORT:-both}
      --port=4001
      --peer-dir=/peer-addrs
      --otlp-endpoint=http://jaeger:4318
    volumes:
      - peer-addrs:/peer-addrs:ro
    networks:
      public-net:
        ipv4_address: 73.0.0.101

  # === JS client behind NAT ===
  client-js:
    <<: *node-js-build
    cap_add:
      - NET_ADMIN
    depends_on:
      router:
        condition: service_started
      jaeger:
        condition: service_started
      server-1:
        condition: service_healthy
      server-2:
        condition: service_healthy
      server-3:
        condition: service_healthy
    profiles: ["js"]
    environment:
      - GATEWAY=auto
    command: >-
      --role=client
      --transport=${TRANSPORT:-both}
      --port=4001
      --peer-dir=/peer-addrs
      --otlp-endpoint=http://jaeger:4318
    volumes:
      - peer-addrs:/peer-addrs:ro
    networks:
      private-net:
        ipv4_address: 10.0.1.10

  # === JS client with public IP (no NAT) ===
  client-js-nonat:
    <<: *node-js-build
    depends_on:
      jaeger:
        condition: service_started
      server-1:
        condition: service_healthy
      server-2:
        condition: service_healthy
      server-3:
        condition: service_healthy
    profiles: ["js-nonat"]
    command: >-
      --role=client
      --transport=${TRANSPORT:-both}
      --port=4001
      --peer-dir=/peer-addrs
      --otlp-endpoint=http://jaeger:4318
    volumes:
      - peer-addrs:/peer-addrs:ro
    networks:
      public-net:
        ipv4_address: 73.0.0.102

  # === JS client for mock server experiments ===
  client-js-mock:
    <<: *node-js-build
    depends_on:
      jaeger:
        condition: service_started
      mock-server-1:
        condition: service_healthy
      mock-server-2:
        condition: service_healthy
      mock-server-3:
        condition: service_healthy
    profiles: ["js-mock"]
    command: >-
      --role=client
      --transport=${TRANSPORT:-both}
      --port=4001
      --peer-dir=/peer-addrs
      --otlp-endpoint=http://jaeger:4318
    volumes:
      - peer-addrs:/peer-addrs:ro
    networks:
      public-net:
        ipv4_address: 73.0.0.102

  # === NAT verification (lightweight, no Go binary) ===
  # Used by testbed/verify-nat.sh to validate iptables rules with plain TCP/UDP.
  # Uses an inline Dockerfile — just Alpine with socat and iproute2.

  test-server1:
    build:
      dockerfile_inline: |
        FROM alpine:3.20
        RUN apk add --no-cache socat iproute2
        CMD ["sleep", "infinity"]
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["test"]
    networks:
      public-net:
        ipv4_address: 73.0.0.10

  test-server2:
    build:
      dockerfile_inline: |
        FROM alpine:3.20
        RUN apk add --no-cache socat iproute2
        CMD ["sleep", "infinity"]
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["test"]
    networks:
      public-net:
        ipv4_address: 73.0.0.11

  test-client:
    build:
      dockerfile_inline: |
        FROM alpine:3.20
        RUN apk add --no-cache socat iproute2
        CMD ["sleep", "infinity"]
    depends_on:
      - router
    cap_add:
      - NET_ADMIN
    profiles: ["test"]
    networks:
      private-net:
        ipv4_address: 10.0.1.10
