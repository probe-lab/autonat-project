name: false-negative-rate
description: >
  False Negative Rate (FNR) measurement: how often AutoNAT incorrectly reports
  a publicly reachable node as "private".

  A false negative occurs when the node IS reachable (nat_type=none or
  full-cone) but AutoNAT fails to converge to at least one reachable address
  within the timeout.

  FNR = failed_runs / total_runs (printed in run.sh summary output).

  Run with --runs=N to increase statistical confidence (suggested: 20-50).

defaults:
  timeout_s: 120
  runs: 20

scenarios:
  # No NAT — node has a public IP, fully reachable by all servers.
  - name: fnr-no-nat-tcp
    nat_type: none
    transport: tcp
    server_count: 7
    assertions:
      - type: has_event
        event: reachable_addrs_changed
        filter: { not_empty: reachable }
        message: "At least one TCP address should be reachable (false negative if fails)"

  - name: fnr-no-nat-quic
    nat_type: none
    transport: quic
    server_count: 7
    assertions:
      - type: has_event
        event: reachable_addrs_changed
        filter: { not_empty: reachable }
        message: "At least one QUIC address should be reachable (false negative if fails)"

  - name: fnr-no-nat-both
    nat_type: none
    transport: both
    server_count: 7
    assertions:
      - type: has_event
        event: reachable_addrs_changed
        filter: { not_empty: reachable }
        message: "At least one address (TCP or QUIC) should be reachable (false negative if fails)"

  # Full-cone NAT — port mappings are stable and inbound is allowed from any source.
  - name: fnr-full-cone-tcp
    nat_type: full-cone
    transport: tcp
    server_count: 7
    assertions:
      - type: has_event
        event: reachable_addrs_changed
        filter: { not_empty: reachable }
        message: "At least one TCP address should be reachable through full-cone NAT (false negative if fails)"

  - name: fnr-full-cone-quic
    nat_type: full-cone
    transport: quic
    server_count: 7
    assertions:
      - type: has_event
        event: reachable_addrs_changed
        filter: { not_empty: reachable }
        message: "At least one QUIC address should be reachable through full-cone NAT (false negative if fails)"

  - name: fnr-full-cone-both
    nat_type: full-cone
    transport: both
    server_count: 7
    assertions:
      - type: has_event
        event: reachable_addrs_changed
        filter: { not_empty: reachable }
        message: "At least one address (TCP or QUIC) should be reachable through full-cone NAT (false negative if fails)"
