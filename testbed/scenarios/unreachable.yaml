name: unreachable
description: >
  Nodes behind restrictive NAT that should NOT be publicly reachable:
  symmetric NAT (ADPM + APDF, different external port per destination) or
  port-restricted cone NAT (EIM + APDF, inbound only from exact IP:port
  pair previously contacted).

  Measures both False Positive Rate and Time-to-Confidence from the same
  trace data:
    FPR = runs where a reachable address appeared / total runs
    TTC = elapsed time from session start to first unreachable verdict

  Post-process:
    python3 testbed/analyze.py --metric fpr,time_to_confidence results/unreachable-*/*.json

defaults:
  timeout_s: 120
  runs: 20
  server_count: 7
  measurements: [false_positive_rate, time_to_confidence]

scenarios:
  # --- Symmetric NAT: endpoint-dependent port mapping, dial-back always
  #     hits the wrong port. No address should ever become reachable. ---

  - name: symmetric-tcp
    nat_type: symmetric
    transport: tcp
    assertions:
      - type: no_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "No TCP address should be reachable through symmetric NAT (false positive if fails)"
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: unreachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_unreachable_ms

  - name: symmetric-quic
    nat_type: symmetric
    transport: quic
    assertions:
      - type: no_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "No QUIC address should be reachable through symmetric NAT (false positive if fails)"
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: unreachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_unreachable_ms

  - name: symmetric-both
    nat_type: symmetric
    transport: both
    assertions:
      - type: no_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "No address should be reachable through symmetric NAT (false positive if fails)"
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: unreachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_unreachable_ms

  # --- Port-restricted cone NAT: inbound allowed only from the exact
  #     IP:port pair the client contacted. Servers dial back from a
  #     different port, so no dial-back should succeed. ---

  - name: port-restricted-tcp
    nat_type: port-restricted
    transport: tcp
    assertions:
      - type: no_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "No TCP address should be reachable through port-restricted NAT (false positive if fails)"
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: unreachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_unreachable_ms

  - name: port-restricted-quic
    nat_type: port-restricted
    transport: quic
    assertions:
      - type: no_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "No QUIC address should be reachable through port-restricted NAT (false positive if fails)"
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: unreachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_unreachable_ms

  - name: port-restricted-both
    nat_type: port-restricted
    transport: both
    assertions:
      - type: no_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "No address should be reachable through port-restricted NAT (false positive if fails)"
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: unreachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_unreachable_ms
