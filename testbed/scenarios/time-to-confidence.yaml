name: time-to-confidence
description: >
  Time-to-Confidence (TTC) measurement: how long it takes AutoNAT v2 to reach
  a stable reachability verdict.

  For reachable nodes (none/full-cone NAT): time from session start to the first
  reachable_addrs_changed event with a non-empty reachable list.

  For unreachable nodes (symmetric NAT): time from session start to the first
  reachable_addrs_changed event with a non-empty unreachable list.

  The info assertions extract elapsed_ms for each run. Run analyze.py to
  aggregate across runs:
    python3 testbed/analyze.py --metric time_to_confidence results/ttc-<timestamp>/*.json

defaults:
  timeout_s: 120
  runs: 20

scenarios:
  # No NAT — direct reachability. Fastest convergence expected (3-10s).
  - name: ttc-no-nat-tcp
    nat_type: none
    transport: tcp
    server_count: 7
    measurements: [time_to_confidence]
    assertions:
      - type: has_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "TCP node should become reachable with no NAT"
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_reachable_ms

  - name: ttc-no-nat-quic
    nat_type: none
    transport: quic
    server_count: 7
    measurements: [time_to_confidence]
    assertions:
      - type: has_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "QUIC node should become reachable with no NAT"
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_reachable_ms

  - name: ttc-no-nat-both
    nat_type: none
    transport: both
    server_count: 7
    measurements: [time_to_confidence]
    assertions:
      - type: has_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "Node should become reachable with no NAT"
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_reachable_ms

  # Full-cone NAT — dial-back always succeeds (EIM + EIF).
  - name: ttc-full-cone-tcp
    nat_type: full-cone
    transport: tcp
    server_count: 7
    measurements: [time_to_confidence]
    assertions:
      - type: has_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "TCP node should become reachable through full-cone NAT"
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_reachable_ms

  - name: ttc-full-cone-quic
    nat_type: full-cone
    transport: quic
    server_count: 7
    measurements: [time_to_confidence]
    assertions:
      - type: has_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "QUIC node should become reachable through full-cone NAT"
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_reachable_ms

  - name: ttc-full-cone-both
    nat_type: full-cone
    transport: both
    server_count: 7
    measurements: [time_to_confidence]
    assertions:
      - type: has_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "Node should become reachable through full-cone NAT"
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_reachable_ms

  # Symmetric NAT — no dial-back possible. Measures time to stable "private"
  # verdict. Expected to be slower (13-20s) as confidence accumulates.
  - name: ttc-symmetric-tcp
    nat_type: symmetric
    transport: tcp
    server_count: 7
    measurements: [time_to_confidence]
    assertions:
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: unreachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_unreachable_ms

  - name: ttc-symmetric-quic
    nat_type: symmetric
    transport: quic
    server_count: 7
    measurements: [time_to_confidence]
    assertions:
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: unreachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_unreachable_ms

  - name: ttc-symmetric-both
    nat_type: symmetric
    transport: both
    server_count: 7
    measurements: [time_to_confidence]
    assertions:
      - type: info
        event: reachable_addrs_changed
        filter: {not_empty: unreachable}
        select: first
        extract: elapsed_ms
        label: time_to_first_unreachable_ms
