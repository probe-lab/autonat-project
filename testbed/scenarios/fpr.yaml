name: false-positive-rate
description: >
  False Positive Rate (FPR) measurement: how often AutoNAT v2 incorrectly
  reports a node behind restrictive NAT as "public" when it should be "private".

  A false positive occurs when no AutoNAT server can successfully dial back to
  the client (symmetric or port-restricted NAT, no port forwarding) but the
  protocol nonetheless emits a reachable_addrs_changed event with a non-empty
  reachable list.

  FPR = false_positive_runs / total_runs

  Post-process traces with:
    python3 testbed/analyze.py --metric fpr results/fpr-<timestamp>/*.json

defaults:
  timeout_s: 120
  runs: 20

scenarios:
  # Symmetric NAT: endpoint-dependent port mapping ensures dial-back always
  # hits the wrong port. No address should ever become reachable.
  - name: fpr-symmetric-tcp
    nat_type: symmetric
    transport: tcp
    server_count: 7
    measurements: [false_positive_rate]
    assertions:
      - type: no_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "No TCP address should be reachable through symmetric NAT (false positive if fails)"

  - name: fpr-symmetric-quic
    nat_type: symmetric
    transport: quic
    server_count: 7
    measurements: [false_positive_rate]
    assertions:
      - type: no_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "No QUIC address should be reachable through symmetric NAT (false positive if fails)"

  - name: fpr-symmetric-both
    nat_type: symmetric
    transport: both
    server_count: 7
    measurements: [false_positive_rate]
    assertions:
      - type: no_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "No address should be reachable through symmetric NAT (false positive if fails)"

  # Port-restricted cone NAT: inbound allowed only from the exact IP:port pair
  # the client contacted. Servers dial back from a different port, so no
  # dial-back should succeed.
  - name: fpr-port-restricted-tcp
    nat_type: port-restricted
    transport: tcp
    server_count: 7
    measurements: [false_positive_rate]
    assertions:
      - type: no_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "No TCP address should be reachable through port-restricted NAT (false positive if fails)"

  - name: fpr-port-restricted-quic
    nat_type: port-restricted
    transport: quic
    server_count: 7
    measurements: [false_positive_rate]
    assertions:
      - type: no_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "No QUIC address should be reachable through port-restricted NAT (false positive if fails)"

  - name: fpr-port-restricted-both
    nat_type: port-restricted
    transport: both
    server_count: 7
    measurements: [false_positive_rate]
    assertions:
      - type: no_event
        event: reachable_addrs_changed
        filter: {not_empty: reachable}
        message: "No address should be reachable through port-restricted NAT (false positive if fails)"
