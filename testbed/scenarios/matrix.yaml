name: full-matrix
description: >
  Full experiment matrix covering all NAT types, transports, and server counts.
  Produces 30 scenarios: 5 NAT types x 2 transports x 3 local server counts.

  Use --filter to run subsets:
    --filter=server_count=5                       Just 5-server experiments
    --filter=nat_type=symmetric                   Just symmetric NAT
    --filter=nat_type=address-restricted --runs=5  Deep dive

defaults:
  timeout_s: 120
  runs: 1

matrix:
  nat_type: [none, full-cone, address-restricted, port-restricted, symmetric]
  transport: [tcp, quic]
  server_count: [3, 5, 7]
